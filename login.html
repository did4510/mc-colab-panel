<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC Colab Panel — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-body">
<div class="bg-grid"></div>
<div class="bg-glow-1"></div>
<div class="bg-glow-2"></div>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo">⛏</div>
      <h1 class="login-title">MC Colab Panel</h1>
      <p class="login-sub">Sign in to manage your server</p>
    </div>

    <form method="post" class="login-form" onsubmit="handleLogin(event)">
      <div class="field-group">
        <label class="field-label">Username</label>
        <div class="field-wrap">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/></svg>
          <input class="field-input" name="u" type="text" placeholder="admin" autocomplete="username" required>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Password</label>
        <div class="field-wrap">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" width="16" height="16"><rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="2"/></svg>
          <input class="field-input" name="p" type="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
      </div>

      <button type="submit" class="login-btn">
        <span>Sign In</span>
        <svg viewBox="0 0 24 24" fill="none" width="16" height="16"><line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2"/><polyline points="12 5 19 12 12 19" stroke="currentColor" stroke-width="2"/></svg>
      </button>
    </form>

    <div class="login-footer">
      <span class="lf-dot"></span>
      Powered by Google Colab · Paper MC 1.21.1
      <span class="lf-dot"></span>
    </div>
  </div>
</div>

<script>
function handleLogin(e) {
  const btn = document.querySelector('.login-btn');
  btn.classList.add('loading');
}
</script>
</body>
</html>
